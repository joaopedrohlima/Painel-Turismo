    function csvParaJsonDashboard(csv) {
        const linhas = csv.trim().split("\n");
        const cabecalho = linhas[0].split(",");

        const viagensMap = {};

        for (let i = 1; i < linhas.length; i++) {
            const valores = linhas[i].split(",");

            const obj = {};
            cabecalho.forEach((col, index) => {
                obj[col.trim()] = (valores[index] || "").trim();
            });

            const nomeViagem = obj.viagem;

            if (!viagensMap[nomeViagem]) {
                viagensMap[nomeViagem] = {
                    data: "03.2025", // você pode dinamizar depois
                    dados: {}
                };
            }

            viagensMap[nomeViagem].dados[obj.cpf.replace(/\D/g, "")] = {
                "Nome Completo": obj.nome,
                "CPF": obj.cpf,
                "Data de Nascimento": obj.data_nascimento,
                "Telefone": obj.telefone,
                "Local de Embarque": obj.local_embarque,
                "Cidade": obj.cidade,
                "Forma de Pagamento": "",
                "Cobrança Realizada?": "TRUE",
                "Status Pagamento": "Em dia",
                "Pago total?": "TRUE",
                "Observações": obj.problema_saude || ""
            };
        }

        const resultado = {
            chavesNomesViagens: Object.keys(viagensMap),
            dadosViagens: viagensMap
        };

        console.log(JSON.stringify(resultado, null, 2));
    }
